<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tikkytokky sidePanel</title>
    <link rel="stylesheet" href="sidepanel.css">
    <style>
        .tabs {
            display: flex;
            width: 100%;
            justify-content: space-between;
            background: #1a1a1a;
            padding: 5px;
        }
        .tab-btn {
            flex: 1;
            font-size: 11px;
            padding: 10px 2px;
            margin: 0 2px;
            white-space: nowrap;
        }
        #settings-menu {
            display: none;
            background: #111;
            border: 1px solid #7000ff;
            padding: 15px;
            margin: 10px;
            border-radius: 8px;
        }
        #key-input {
            width: 100%;
            height: 60px;
            background: #000;
            color: #00f0ff;
            border: 1px solid #333;
            font-family: monospace;
            font-size: 10px;
            margin-bottom: 8px;
        }
        #debug-logger {
            height: 100px;
            background: #000;
            color: #00ff00;
            font-family: monospace;
            font-size: 10px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding: 8px;
        }
    </style>
</head>
<body>
<div class="settings-toggle-btn" id="settings-gear" style="cursor:pointer; position:fixed; top:10px; right:10px; z-index:100;">⚙️</div>

<div class="glass-container">
    <header style="padding: 10px;">
        <h1 class="logo">tikky<span>tokky</span></h1>
        <div class="status-bar" style="display:flex; justify-content:space-between; font-size:10px; opacity:0.6;">
            <span id="ai-status">randomgirlirl: ACTIVE</span>
            <span id="key-status">Keys: 0</span>
        </div>
    </header>

    <div id="settings-menu">
        <h3 style="font-size:12px; color:#00f0ff;">Gemini API Keys</h3>
        <textarea id="key-input" placeholder="Paste keys (one per line)"></textarea>
        <button id="save-keys" class="btn-4" style="padding:5px; font-size:10px;">SAVE KEYS</button>
        <div id="key-list" style="margin-top:10px; font-size:9px; color:#888;"></div>
    </div>

    <nav class="tabs">
        <button class="tab-btn active" data-tab="waves">Waves</button>
        <button class="tab-btn" data-tab="vault">Vault</button>
        <button class="tab-btn" data-tab="social">Social</button>
        <button class="tab-btn" data-tab="transform">Engine</button>
    </nav>

    <main class="content-area" style="padding: 15px;">
        <section id="waves" class="tab-content active">
            <button id="refresh-trends" class="btn-1">1 - REFRESH WAVES</button>

            <div class="glass-card" style="margin-top:15px; padding:10px; border:1px solid #333; border-radius:8px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:11px;">Ghost Scroller (FYP)</span>
                    <input type="checkbox" id="warm-up-toggle">
                </div>
            </div>

            <div id="waves-list" style="margin-top:15px;">
                <p class="empty-msg" style="font-size:10px; opacity:0.5;">Scanning #MainCharacter lore...</p>
            </div>
        </section>

        <section id="vault" class="tab-content" style="display:none;">
            <div id="vault-list" class="vault-grid"></div>
        </section>

        <section id="social" class="tab-content" style="display:none;">
            <button id="shotgun-hashtags" class="btn-2">2 - SHOTGUN HOOK</button>
            <button id="human-comment" class="btn-2" style="margin-top:10px;">5 - HUMAN COMMENT</button>
            <button id="train-fyp" class="btn-1" style="margin-top:10px; background:#e83e8c !important;">6 - TRAIN ALGORITHM</button>
        </section>

        <section id="transform" class="tab-content" style="display:none;">
            <button id="init-engine" class="btn-3">3 - INITIALIZE ENGINE</button>
            <button id="transform-video" class="btn-4" style="margin-top:10px;" disabled>4 - TRANSFORM & POST</button>
        </section>
    </main>

    <div style="padding:2px 10px; font-size:8px; color:#444; background:#000;">DEBUG LOGS</div>
    <div id="debug-logger"></div>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
